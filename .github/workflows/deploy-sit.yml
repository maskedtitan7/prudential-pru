name: Deploy to SIT

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        uses: salesforcecli/github-action@v2

      - name: Authenticate to SIT
        run: |
          echo "${{ secrets.SFDX_AUTH_URL_SIT }}" > auth.txt
          sf org login sfdx-url --sfdx-url-file auth.txt --alias SIT

      - name: Deploy to SIT
        run: sf project deploy start --source-dir force-app --target-org SIT